<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epstine.Fun | Live Session</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg: #080808;
            --card-bg: rgba(18, 18, 18, 0.7);
            --accent: #7C5CBF;
            --accent-glow: rgba(124, 92, 191, 0.4);
            --text-primary: #F0EFF5;
            --text-muted: #5C5C6E;
            --yes-color: #22c55e;
            --no-color: #ef4444;
            --love-color: #f43f5e;
            --top-bar-bg: rgba(8, 8, 8, 0.5);
            --transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body.light-mode {
            --bg: #F8F7FF;
            --card-bg: #FFFFFF;
            --text-primary: #1A1A1F;
            --text-muted: #6B6B7D;
            --top-bar-bg: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        html { background-color: var(--bg); }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: transparent;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .pixel-snow-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        header, .main-container { position: relative; z-index: 10; }

        .top-bar {
            height: 80px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--top-bar-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(124, 92, 191, 0.1);
        }

        .brand { font-weight: 800; font-size: 20px; display: flex; align-items: center; gap: 12px; }
        .live-dot { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        .leave-session-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        .leave-session-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .room-info { text-align: center; }
        .room-name { font-weight: 700; font-size: 16px; }

        .profile-sidebar { 
            position: absolute;
            top: 0;
            bottom: 0;
            width: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
            z-index: 20;
        }
        .sidebar-left { left: 40px; }
        .sidebar-right { right: 40px; }

        .profile-item { display: flex; flex-direction: column; align-items: center; gap: 12px; opacity: 0.3; transition: var(--transition); }
        .profile-item.active { opacity: 1; }
        
        .avatar-wrap { position: relative; width: 64px; height: 64px; }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; font-size: 32px; background: rgba(255,255,255,0.05); z-index: 2; position: relative; }

        @media (max-width: 768px) {
            .profile-sidebar { width: 60px; gap: 20px; }
            .sidebar-left { left: 10px; }
            .sidebar-right { right: 10px; }
            .avatar-wrap { width: 44px; height: 44px; }
            .profile-name { display: none; }
            .card-stack { width: 260px; height: 400px; }
            .card-title { font-size: 24px; }
            .main-container { padding: 0 10px; }
            .top-bar { padding: 0 20px; }
        }

        .profile-item.active .avatar-wrap::before {
            content: ''; position: absolute; inset: -4px; border: 3px solid var(--accent); border-radius: 50%; animation: speaking-pulse 1.5s infinite; z-index: 1;
        }

        @keyframes speaking-pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 0.2; } 100% { transform: scale(1.3); opacity: 0; } }
        .profile-name { font-size: 12px; font-weight: 700; color: var(--text-muted); }
        .profile-item.active .profile-name { color: var(--accent); }

        .main-container { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .center-stage { flex: 1; height: 600px; position: relative; display: flex; align-items: center; justify-content: center; perspective: 1000px; }
        
        .card-stack { position: relative; width: 320px; height: 480px; z-index: 100; }
        .card { position: absolute; width: 100%; height: 100%; border-radius: 32px; background-color: var(--card-bg); overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.6); cursor: grab; border: 1px solid rgba(255,255,255,0.05); touch-action: none; }
        .card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .card-overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        .card-title { font-size: 32px; font-weight: 800; line-height: 1.1; margin-top: 10px; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        .swipe-indicator { position: absolute; padding: 12px 24px; border-radius: 12px; font-size: 24px; font-weight: 900; border: 4px solid; opacity: 0; z-index: 200; pointer-events: none; }
        .indicator-yes { top: 10%; left: 20%; border-color: var(--yes-color); color: var(--yes-color); transform: rotate(-15deg); }
        .indicator-no { top: 10%; right: 20%; border-color: var(--no-color); color: var(--no-color); transform: rotate(15deg); }
        .indicator-love { top: 10%; left: 50%; transform: translateX(-50%); border-color: var(--love-color); color: var(--love-color); }

        /* Next Player Screen */
        #transition-screen {
            position: fixed; inset: 0; background: rgba(8, 8, 8, 0.7); backdrop-filter: blur(20px); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; opacity: 1;
        }
        #transition-screen h2 { font-size: 16px; color: var(--accent); letter-spacing: 4px; margin-bottom: 20px; }
        #transition-screen h1 { font-size: 48px; font-weight: 800; margin-bottom: 40px; color: var(--text-primary); }
        .ready-btn { background: var(--accent); color: #fff; border: none; padding: 18px 48px; border-radius: 20px; font-weight: 800; cursor: pointer; font-size: 18px; }

        /* Results Screen */
        #results-screen { position: fixed; inset: 0; background: rgba(8, 8, 8, 0.7); backdrop-filter: blur(20px); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; opacity: 1; }
        #results-screen h1 { color: var(--text-primary); }
        .winner-card { width: 300px; height: 440px; border-radius: 32px; margin: 20px 0; background-size: cover; background-position: center; border: 4px solid var(--accent); box-shadow: 0 0 50px var(--accent-glow); }
        .restart-btn { margin-top: 30px; background: var(--accent); color: #fff; padding: 14px 32px; border-radius: 999px; font-weight: 700; text-decoration: none; }

        /* Host Controlled Meme Styles */
        .host-badge {
            background: var(--accent);
            color: #fff;
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            position: absolute;
            top: -5px;
            right: -5px;
            font-weight: 800;
            z-index: 10;
            box-shadow: 0 2px 10px rgba(124, 92, 191, 0.4);
        }
        
        .host-control-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(124, 92, 191, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(124, 92, 191, 0.2);
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .meme-mode .host-control-indicator { display: flex; }
        .meme-mode #player-count-container { display: none; }
    </style>
</head>
<body>

    <div id="pixel-snow" class="pixel-snow-container"></div>

        <header class="top-bar">
        <div class="brand"><div class="live-dot"></div>Epstine.Fun</div>
        <div class="room-info"><div class="room-name" id="room-display">SESSION</div></div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="host-indicator" class="host-control-indicator"><div class="live-dot" style="width:6px; height:6px;"></div> HOST CONTROLLING</div>
            <div id="player-count-container" style="font-size: 12px; font-weight: 800; color: var(--accent);">PLAYER <span id="cur-player-num">1</span> OF <span id="total-players-num">6</span></div>
            <a href="sidekick_section.html" class="leave-session-btn">Leave</a>
        </div>
    </header>

    <main class="main-container">
        <div class="profile-sidebar sidebar-left">
            <div class="profile-item" id="p-1"><div class="avatar-wrap"><div class="profile-avatar">🧔</div></div><div class="profile-name">Alex</div></div>
            <div class="profile-item" id="p-2"><div class="avatar-wrap"><div class="profile-avatar">👩</div></div><div class="profile-name">Sarah</div></div>
            <div class="profile-item" id="p-3"><div class="avatar-wrap"><div class="profile-avatar">🧒</div></div><div class="profile-name">Jordan</div></div>
        </div>

        <div class="center-stage">
            <div class="swipe-indicator indicator-yes" id="indicator-yes">👍 YES</div>
            <div class="swipe-indicator indicator-no" id="indicator-no">👎 NO</div>
            <div class="swipe-indicator indicator-love" id="indicator-love">❤️ LOVE</div>
            <div class="card-stack" id="card-stack"></div>
        </div>

        <div class="profile-sidebar sidebar-right">
            <div class="profile-item" id="p-4"><div class="avatar-wrap"><div class="profile-avatar">👱</div></div><div class="profile-name">Chris</div></div>
            <div class="profile-item" id="p-5"><div class="avatar-wrap"><div class="profile-avatar">👩‍🦱</div></div><div class="profile-name">Mia</div></div>
            <div class="profile-item" id="p-6"><div class="avatar-wrap"><div class="profile-avatar">👨‍🦳</div></div><div class="profile-name">Liam</div></div>
        </div>
    </main>

    <div id="transition-screen">
        <h2>TURN COMPLETE</h2>
        <h1 id="next-player-name">Next Player's Turn</h1>
        <button class="ready-btn" id="start-next-turn">I'M READY</button>
    </div>

    <div id="results-screen">
        <h2 id="win-label" style="color: var(--accent); letter-spacing: 4px;">GROUP WINNER</h2>
        <h1 id="win-name" style="font-size: 48px; margin: 10px 0;">Item Name</h1>
        <div class="winner-card" id="win-card"></div>
        <div id="win-score" style="font-weight: 700; font-size: 20px;">Final Score: 0</div>
        <a href="sidekick_section.html" class="restart-btn">New Session</a>
    </div>

    <script>
        // --- PixelSnow logic here (Full version) ---
        const PixelSnow = (function() {
            const vertexShader = `
                void main() {
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                precision mediump float;

                uniform float uTime;
                uniform vec2 uResolution;
                uniform float uFlakeSize;
                uniform float uMinFlakeSize;
                uniform float uPixelResolution;
                uniform float uSpeed;
                uniform float uDepthFade;
                uniform float uFarPlane;
                uniform vec3 uColor;
                uniform float uBrightness;
                uniform float uGamma;
                uniform float uDensity;
                uniform float uVariant;
                uniform float uDirection;

                #define PI 3.14159265
                #define PI_OVER_6 0.5235988
                #define PI_OVER_3 1.0471976
                #define INV_SQRT3 0.57735027
                #define M1 1597334677U
                #define M2 3812015801U
                #define M3 3299493293U
                #define F0 2.3283064e-10

                #define hash(n) (n * (n ^ (n >> 15)))
                #define coord3(p) (uvec3(p).x * M1 ^ uvec3(p).y * M2 ^ uvec3(p).z * M3)

                const vec3 camK = vec3(0.57735027, 0.57735027, 0.57735027);
                const vec3 camI = vec3(0.70710678, 0.0, -0.70710678);
                const vec3 camJ = vec3(-0.40824829, 0.81649658, -0.40824829);
                const vec2 b1d = vec2(0.574, 0.819);

                vec3 hash3(uint n) {
                    uvec3 hashed = hash(n) * uvec3(1U, 511U, 262143U);
                    return vec3(hashed) * F0;
                }

                float snowflakeDist(vec2 p) {
                    float r = length(p);
                    float a = atan(p.y, p.x);
                    a = abs(mod(a + PI_OVER_6, PI_OVER_3) - PI_OVER_6);
                    vec2 q = r * vec2(cos(a), sin(a));
                    float dMain = max(abs(q.y), max(-q.x, q.x - 1.0));
                    float b1t = clamp(dot(q - vec2(0.4, 0.0), b1d), 0.0, 0.4);
                    float dB1 = length(q - vec2(0.4, 0.0) - b1t * b1d);
                    float b2t = clamp(dot(q - vec2(0.7, 0.0), b1d), 0.0, 0.25);
                    float dB2 = length(q - vec2(0.7, 0.0) - b2t * b1d);
                    return min(dMain, min(dB1, dB2)) * 10.0;
                }

                void main() {
                    float invPixelRes = 1.0 / uPixelResolution;
                    float pixelSize = max(1.0, floor(0.5 + uResolution.x * invPixelRes));
                    float invPixelSize = 1.0 / pixelSize;
                    
                    vec2 fragCoord = floor(gl_FragCoord.xy * invPixelSize);
                    vec2 res = uResolution * invPixelSize;
                    float invResX = 1.0 / res.x;

                    vec3 ray = normalize(vec3((fragCoord - res * 0.5) * invResX, 1.0));
                    ray = ray.x * camI + ray.y * camJ + ray.z * camK;

                    float timeSpeed = uTime * uSpeed;
                    float windX = cos(uDirection) * 0.4;
                    float windY = sin(uDirection) * 0.4;
                    vec3 camPos = (windX * camI + windY * camJ + 0.1 * camK) * timeSpeed;
                    vec3 pos = camPos;

                    vec3 absRay = max(abs(ray), vec3(0.001));
                    vec3 strides = 1.0 / absRay;
                    vec3 raySign = step(ray, vec3(0.0));
                    vec3 phase = fract(pos) * strides;
                    phase = mix(strides - phase, phase, raySign);

                    float rayDotCamK = dot(ray, camK);
                    float invRayDotCamK = 1.0 / rayDotCamK;
                    float invDepthFade = 1.0 / uDepthFade;
                    float halfInvResX = 0.5 * invResX;
                    vec3 timeAnim = timeSpeed * 0.1 * vec3(7.0, 8.0, 5.0);

                    float t = 0.0;
                    for (int i = 0; i < 64; i++) {
                        if (t >= uFarPlane) break;
                        
                        vec3 fpos = floor(pos);
                        uint cellCoord = coord3(fpos);
                        float cellHash = hash3(cellCoord).x;

                        if (cellHash < uDensity) {
                            vec3 h = hash3(cellCoord);
                            vec3 sinArg1 = fpos.yzx * 0.073;
                            vec3 sinArg2 = fpos.zxy * 0.27;
                            vec3 flakePos = 0.5 - 0.5 * cos(4.0 * sin(sinArg1) + 4.0 * sin(sinArg2) + 2.0 * h + timeAnim);
                            flakePos = flakePos * 0.8 + 0.1 + fpos;

                                float toIntersection = dot(flakePos - pos, camK) * invRayDotCamK;
                                
                                if (toIntersection > 0.0) {
                                    vec3 testPos = pos + ray * toIntersection - flakePos;
                                    float testX = dot(testPos, camI);
                                    float testY = dot(testPos, camJ);
                                    vec2 testUV = abs(vec2(testX, testY));
                                    
                                    float depth = dot(flakePos - camPos, camK);
                                    float flakeSize = max(uFlakeSize, uMinFlakeSize * depth * halfInvResX);
                                    
                                    float dist;
                                    if (uVariant < 0.5) {
                                        dist = max(testUV.x, testUV.y);
                                    } else if (uVariant < 1.5) {
                                        dist = length(testUV);
                                    } else {
                                        float invFlakeSize = 1.0 / flakeSize;
                                        dist = snowflakeDist(vec2(testX, testY) * invFlakeSize) * flakeSize;
                                    }

                                    if (dist < flakeSize) {
                                        float flakeSizeRatio = uFlakeSize / flakeSize;
                                        float intensity = exp2(-(t + toIntersection) * invDepthFade) *
                                                         min(1.0, flakeSizeRatio * flakeSizeRatio) * uBrightness;
                                        gl_FragColor = vec4(uColor * pow(vec3(intensity), vec3(uGamma)), 1.0);
                                        return;
                                    }
                                }
                            }

                            float nextStep = min(min(phase.x, phase.y), phase.z);
                            vec3 sel = step(phase, vec3(nextStep));
                            phase = phase - nextStep + strides * sel;
                            t += nextStep;
                            pos = mix(pos + ray * nextStep, floor(pos + ray * nextStep + 0.5), sel);
                        }
                        gl_FragColor = vec4(0.0);
                    }
                `;

                return class {
                    constructor(container, props = {}) {
                        this.container = container;
                        this.props = {
                            color: '#ffffff',
                            flakeSize: 0.015,
                            minFlakeSize: 1.25,
                            pixelResolution: 480,
                            speed: 1.25,
                            depthFade: 9.5,
                            farPlane: 30,
                            brightness: 0.5,
                            gamma: 0.4545,
                            density: 0.2,
                            variant: 'snowflake',
                            direction: 125,
                            ...props
                        };
                        this.init();
                    }

                    init() {
                        this.scene = new THREE.Scene();
                        this.camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                        this.renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: 'high-performance' });
                        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                        this.renderer.setSize(this.container.offsetWidth, this.container.offsetHeight);
                        this.renderer.setClearColor(0x000000, 0);
                        this.container.appendChild(this.renderer.domElement);

                        const threeColor = new THREE.Color(this.props.color);
                        const variantValue = this.props.variant === 'round' ? 1.0 : this.props.variant === 'snowflake' ? 2.0 : 0.0;

                        this.material = new THREE.ShaderMaterial({
                            vertexShader,
                            fragmentShader,
                            uniforms: {
                                uTime: { value: 0 },
                                uResolution: { value: new THREE.Vector2(this.container.offsetWidth, this.container.offsetHeight) },
                                uFlakeSize: { value: this.props.flakeSize },
                                uMinFlakeSize: { value: this.props.minFlakeSize },
                                uPixelResolution: { value: this.props.pixelResolution },
                                uSpeed: { value: this.props.speed },
                                uDepthFade: { value: this.props.depthFade },
                                uFarPlane: { value: this.props.farPlane },
                                uColor: { value: new THREE.Vector3(threeColor.r, threeColor.g, threeColor.b) },
                                uBrightness: { value: this.props.brightness },
                                uGamma: { value: this.props.gamma },
                                uDensity: { value: this.props.density },
                                uVariant: { value: variantValue },
                                uDirection: { value: (this.props.direction * Math.PI) / 180 }
                            },
                            transparent: true
                        });

                        this.mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), this.material);
                        this.scene.add(this.mesh);

                        this.resize = this.resize.bind(this);
                        window.addEventListener('resize', this.resize);

                        this.startTime = performance.now();
                        this.animate = this.animate.bind(this);
                        requestAnimationFrame(this.animate);
                    }

                    animate() {
                        this.material.uniforms.uTime.value = (performance.now() - this.startTime) * 0.001;
                        this.renderer.render(this.scene, this.camera);
                        this.requestRef = requestAnimationFrame(this.animate);
                    }

                    resize() {
                        const w = this.container.offsetWidth, h = this.container.offsetHeight;
                        this.renderer.setSize(w, h);
                        this.material.uniforms.uResolution.value.set(w, h);
                    }
                };
            })();
        // --- Data & Initialization ---
        let baseCardData = [
            { id: 0, title: 'Inception', img: 'assets/cards/card1.jpg', score: 0 },
            { id: 1, title: 'Dark Knight', img: 'assets/cards/card2.jpg', score: 0 },
            { id: 2, title: 'Interstellar', img: 'assets/cards/card3.jpg', score: 0 },
            { id: 3, title: 'Dune 2', img: 'assets/cards/card4.jpg', score: 0 },
            { id: 4, title: 'The Matrix', img: 'assets/cards/card5.jpg', score: 0 }
        ];

        let cards = [];
        let cardIdx = 0;
        let activePlayerIdx = 0;
        let totalPlayers = 6;
        let sessionPlayers = [];
        let sessionAvatars = [];
        let currentDeck = [];
        const roomNameRaw = (new URLSearchParams(window.location.search).get('room') || '').toLowerCase();
        const isMemeMode = roomNameRaw.includes('meme');

        document.addEventListener('DOMContentLoaded', () => {
            // Load saved theme
            const savedTheme = localStorage.getItem('quorum_theme') || 'dark';
            if (savedTheme === 'light') document.body.classList.add('light-mode');
            if (isMemeMode) document.body.classList.add('meme-mode');

            new PixelSnow(document.getElementById('pixel-snow'), {
                color: document.body.classList.contains('light-mode') ? '#a080ff' : '#ffffff',
                brightness: document.body.classList.contains('light-mode') ? 0.3 : 0.5
            });
            const urlParams = new URLSearchParams(window.location.search);
            totalPlayers = parseInt(urlParams.get('count')) || 6;
            
            // Load Dynamic Players
            const savedPlayers = localStorage.getItem('quorum_session_players');
            const savedAvatars = localStorage.getItem('quorum_session_avatars');
            if (savedPlayers) sessionPlayers = JSON.parse(savedPlayers);
            if (savedAvatars) sessionAvatars = JSON.parse(savedAvatars);

            // Load Custom Deck
            const savedDeck = localStorage.getItem('quorum_session_deck');
            if (savedDeck) {
                const deckItems = JSON.parse(savedDeck);
                if (deckItems.length > 0) {
                    currentDeck = deckItems.map((item, i) => {
                        const name = typeof item === 'string' ? item : (item.name || `Item ${i+1}`);
                        const img = typeof item === 'object' && item.data ? item.data : `https://picsum.photos/seed/${encodeURIComponent(name)}/800/1200`;
                        return { id: i, title: name, img: img, score: 0 };
                    });
                } else {
                    currentDeck = baseCardData;
                }
            } else {
                currentDeck = baseCardData;
            }

            document.getElementById('total-players-num').innerText = totalPlayers;
            const roomNameRaw = (urlParams.get('room') || 'SESSION').toLowerCase();
            document.getElementById('room-display').innerText = roomNameRaw.replace('/', '').toUpperCase();

            // Update profile displays
            for (let i = 0; i < totalPlayers; i++) {
                const profile = document.getElementById(`p-${i + 1}`);
                if (profile) {
                    profile.style.display = 'flex';
                    profile.querySelector('.profile-name').innerText = sessionPlayers[i] || `Player ${i+1}`;
                    profile.querySelector('.profile-avatar').innerText = sessionAvatars[i] || '👤';
                }
            }

            startPlayerTurn();
            
            document.getElementById('start-next-turn').addEventListener('click', () => {
                gsap.to('#transition-screen', { opacity: 0, duration: 0.4, onComplete: () => {
                    document.getElementById('transition-screen').style.display = 'none';
                    startPlayerTurn();
                }});
            });
        });

        function startPlayerTurn() {
            cardIdx = 0;
            if (isMemeMode) activePlayerIdx = 0; // Always host in meme mode
            document.getElementById('cur-player-num').innerText = activePlayerIdx + 1;
            
            // Update active profile
            document.querySelectorAll('.profile-item').forEach(el => el.classList.remove('active'));
            const activeProfile = document.getElementById(`p-${activePlayerIdx + 1}`);
            if (activeProfile) activeProfile.classList.add('active');

            // Add Host Badge if needed
            const hostProfile = document.getElementById('p-1');
            if (hostProfile && !hostProfile.querySelector('.host-badge')) {
                const badge = document.createElement('div');
                badge.className = 'host-badge';
                badge.innerText = 'HOST';
                hostProfile.querySelector('.avatar-wrap').appendChild(badge);
            }

            // Reset stack
            const stack = document.getElementById('card-stack');
            stack.innerHTML = '';
            cards = [];
            currentDeck.forEach((d, i) => {
                const el = document.createElement('div');
                el.className = 'card';
                el.innerHTML = `
                    <img src="${d.img}" class="card-img" style="opacity: 1;">
                    <div class="card-overlay" style="background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%); justify-content: flex-end; align-items: flex-start; padding: 24px;">
                        <div class="card-title" style="font-size: 18px; font-weight: 700; opacity: 0.9; margin: 0;">${d.title}</div>
                    </div>
                `;
                gsap.set(el, { zIndex: 100 - i, scale: 1 - i * 0.05, y: i * 20, opacity: i > 2 ? 0 : 1 });
                stack.appendChild(el);
                cards.push(el);
            });
            setupDraggable();

            // Meme Reaction Timing
            const roomNameRaw = (new URLSearchParams(window.location.search).get('room') || '').toLowerCase();
            if (roomNameRaw.includes('meme')) {
                setTimeout(triggerMemeReaction, 3000);
            }
        }

        function triggerMemeReaction() {
            const profiles = document.querySelectorAll('.profile-item');
            profiles.forEach(profile => {
                if (window.getComputedStyle(profile).display === 'none') return;
                
                const avatar = profile.querySelector('.avatar-wrap');
                if (!avatar) return;

                // Avatar Bounce
                gsap.to(avatar, { scale: 1.2, duration: 0.3, yoyo: true, repeat: 5, ease: "back.out(1.7)" });
                
                // Emoji Burst
                const rect = avatar.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                for (let i = 0; i < 10; i++) {
                    const emoji = document.createElement('div');
                    emoji.innerText = '😂';
                    emoji.style.position = 'fixed';
                    emoji.style.left = `${centerX}px`;
                    emoji.style.top = `${centerY}px`;
                    emoji.style.fontSize = `${20 + Math.random() * 20}px`;
                    emoji.style.pointerEvents = 'none';
                    emoji.style.zIndex = '5000';
                    emoji.style.transform = 'translate(-50%, -50%)';
                    document.body.appendChild(emoji);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 150 + Math.random() * 200;
                    const tx = Math.cos(angle) * velocity;
                    const ty = Math.sin(angle) * velocity - 150; // Initial burst + float up
                    
                    gsap.to(emoji, {
                        x: tx,
                        y: ty,
                        rotation: Math.random() * 720 - 360,
                        opacity: 0,
                        scale: 1.5,
                        duration: 3 + Math.random(),
                        ease: "power1.out",
                        onComplete: () => emoji.remove()
                    });
                }
            });
        }

        function setupDraggable() {
            if (cards.length === 0) {
                if (isMemeMode) {
                    showResults();
                    return;
                }
                activePlayerIdx++;
                if (activePlayerIdx < totalPlayers) {
                    showTransition();
                } else {
                    showResults();
                }
                return;
            }
            const top = cards[0];
            Draggable.create(top, {
                type: "x,y",
                onDrag: function() {
                    gsap.set(top, { rotation: this.x / 20 });
                    if (this.x > 50) gsap.set('#indicator-yes', { opacity: Math.min(this.x/150, 1) });
                    else if (this.x < -50) gsap.set('#indicator-no', { opacity: Math.min(Math.abs(this.x)/150, 1) });
                    else if (this.y < -50) gsap.set('#indicator-love', { opacity: Math.min(Math.abs(this.y)/150, 1) });
                    else gsap.set(['#indicator-yes', '#indicator-no', '#indicator-love'], { opacity: 0 });
                },
                onDragEnd: function() {
                    if (this.x > 150) swipe('right');
                    else if (this.x < -150) swipe('left');
                    else if (this.y < -150) swipe('up');
                    else gsap.to(top, { x: 0, y: 0, rotation: 0, duration: 0.5, ease: 'elastic.out' });
                }
            });
        }

        function swipe(dir) {
            const card = cards.shift();
            const data = currentDeck[cardIdx++];
            let xT = 0, yT = 0, rot = 0;
            if (dir === 'right') { xT = 1000; rot = 45; data.score += 1; }
            else if (dir === 'left') { xT = -1000; rot = -45; }
            else if (dir === 'up') { yT = -1000; data.score += 3; }
            
            gsap.to(card, { x: xT, y: yT, rotation: rot, opacity: 0, duration: 0.8, onComplete: () => card.remove() });
            gsap.set(['#indicator-yes', '#indicator-no', '#indicator-love'], { opacity: 0 });
            cards.forEach((c, i) => gsap.to(c, { scale: 1 - i * 0.05, y: i * 20, opacity: i > 2 ? 0 : 1, duration: 0.4 }));
            setupDraggable();
        }

        function showTransition() {
            const screen = document.getElementById('transition-screen');
            document.getElementById('next-player-name').innerText = sessionPlayers[activePlayerIdx] + "'s Turn";
            screen.style.display = 'flex';
            gsap.fromTo(screen, { opacity: 0 }, { opacity: 1, duration: 0.5 });
        }

        function showResults() {
            const res = document.getElementById('results-screen');
            res.style.display = 'flex';
            
            if (isMemeMode) {
                document.getElementById('win-label').innerText = "SESSION COMPLETE";
                document.getElementById('win-name').innerText = "MEMES OVER";
                document.getElementById('win-card').style.display = 'none';
                document.getElementById('win-score').innerText = "Add more memes or end the room.";
                const restartBtn = res.querySelector('.restart-btn');
                if (restartBtn) {
                    restartBtn.innerText = "Back to Lobby";
                    // If we want to go back to the specific lobby:
                    const room = new URLSearchParams(window.location.search).get('room');
                    restartBtn.href = `lobby.html?room=${room}`;
                }
            } else {
                const winner = [...currentDeck].sort((a,b) => b.score - a.score)[0];
                document.getElementById('win-label').innerText = "GROUP WINNER";
                document.getElementById('win-name').innerText = winner.title;
                document.getElementById('win-card').style.backgroundImage = `url(${winner.img})`;
                document.getElementById('win-card').style.display = 'block';
                document.getElementById('win-score').innerText = `Final Group Score: ${winner.score}`;
            }

            gsap.to(res, { opacity: 1, duration: 0.8 });
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#7C5CBF', '#ffffff'] });
        }
    </script>
</body>
</html>
