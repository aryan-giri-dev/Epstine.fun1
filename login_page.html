<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epstine.Fun | Create Profile</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Three.js CDN for PixelSnow -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        :root {
            --bg-base: #080808;
            --bg-sec: #0c0c0c;
            --accent: #7C5CBF;
            --accent-glow: #9370DB;
            --text-primary: #F0EFF5;
            --text-muted: #5C5C6E;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body.light-mode {
            --bg-base: #F8F7FF;
            --bg-sec: #FFFFFF;
            --text-primary: #1A1A1F;
            --text-muted: #6B6B7D;
            --glass: rgba(124, 92, 191, 0.05);
            --glass-border: rgba(124, 92, 191, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Subtle Noise Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
        }

        /* PixelSnow Container */
        .pixel-snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .pixel-snow-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Login Card */
        .login-card {
            width: min(480px, 90%);
            padding: 60px 48px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            position: relative;
            z-index: 10;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(30px);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 40px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            margin-left: 4px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            transition: var(--transition);
            outline: none;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(124, 92, 191, 0.2);
        }

        /* Avatar Selection */
        .avatar-section {
            text-align: left;
            margin-bottom: 40px;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin: 30px 0;
        }

        @media (max-width: 480px) {
            .login-card { padding: 40px 24px; width: 95%; }
            .avatar-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            h1 { font-size: 28px; }
        }

        .avatar-option {
            aspect-ratio: 1;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .avatar-option:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .avatar-option.selected {
            border-color: var(--accent);
            background: rgba(124, 92, 191, 0.1);
        }

        .avatar-icon {
            font-size: 32px;
            opacity: 1;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 30px 0;
        }

        .emoji-option {
            font-size: 28px;
            padding: 12px;
            cursor: pointer;
            border-radius: 16px;
            transition: 0.2s;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-option:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
        .emoji-option.selected { border-color: var(--accent); background: rgba(124, 92, 191, 0.1); }

        /* CTA Button */
        .cta-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 30px rgba(124, 92, 191, 0.3);
        }

        .cta-btn:hover {
            background: var(--accent-glow);
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(124, 92, 191, 0.5);
        }

        .cta-btn:active {
            transform: translateY(0);
        }

        /* Back Link */
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- Global PixelSnow Background -->
    <div id="pixel-snow" class="pixel-snow-container"></div>

    <div class="login-container">
        <div class="login-card" id="login-card">
            <h1>Join Epstine.Fun</h1>
            <p class="subtitle">Set up your profile to start deciding together.</p>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your name or username" autocomplete="off">
            </div>
            
            <div class="avatar-section">
                <label>Choose Your Avatar</label>
                <div class="emoji-grid" id="avatar-grid"></div>
            </div>
            
            <button class="cta-btn" id="submit-btn">Create User ID</button>
            
            <a href="landing_page.html" class="back-link">← Back to home</a>
        </div>
    </div>

    <script>
        // --- PixelSnow Component Port ---
        const PixelSnow = (function() {
            const vertexShader = `void main() { gl_Position = vec4(position, 1.0); }`;
            const fragmentShader = `
                precision mediump float;
                uniform float uTime;
                uniform vec2 uResolution;
                uniform float uFlakeSize;
                uniform float uMinFlakeSize;
                uniform float uPixelResolution;
                uniform float uSpeed;
                uniform float uDepthFade;
                uniform float uFarPlane;
                uniform vec3 uColor;
                uniform float uBrightness;
                uniform float uGamma;
                uniform float uDensity;
                uniform float uVariant;
                uniform float uDirection;

                #define PI 3.14159265
                #define M1 1597334677U
                #define M2 3812015801U
                #define M3 3299493293U
                #define F0 2.3283064e-10
                #define hash(n) (n * (n ^ (n >> 15)))
                #define coord3(p) (uvec3(p).x * M1 ^ uvec3(p).y * M2 ^ uvec3(p).z * M3)

                const vec3 camK = vec3(0.57735027, 0.57735027, 0.57735027);
                const vec3 camI = vec3(0.70710678, 0.0, -0.70710678);
                const vec3 camJ = vec3(-0.40824829, 0.81649658, -0.40824829);

                vec3 hash3(uint n) {
                    uvec3 hashed = hash(n) * uvec3(1U, 511U, 262143U);
                    return vec3(hashed) * F0;
                }

                void main() {
                    float invPixelRes = 1.0 / uPixelResolution;
                    float pixelSize = max(1.0, floor(0.5 + uResolution.x * invPixelRes));
                    float invPixelSize = 1.0 / pixelSize;
                    vec2 fragCoord = floor(gl_FragCoord.xy * invPixelSize);
                    vec2 res = uResolution * invPixelSize;
                    float invResX = 1.0 / res.x;

                    vec3 ray = normalize(vec3((fragCoord - res * 0.5) * invResX, 1.0));
                    ray = ray.x * camI + ray.y * camJ + ray.z * camK;

                    float timeSpeed = uTime * uSpeed;
                    vec3 camPos = (cos(uDirection)*0.4 * camI + sin(uDirection)*0.4 * camJ + 0.1 * camK) * timeSpeed;
                    vec3 pos = camPos;

                    vec3 strides = 1.0 / max(abs(ray), vec3(0.001));
                    vec3 raySign = step(ray, vec3(0.0));
                    vec3 phase = fract(pos) * strides;
                    phase = mix(strides - phase, phase, raySign);

                    float t = 0.0;
                    for (int i = 0; i < 64; i++) {
                        if (t >= uFarPlane) break;
                        vec3 fpos = floor(pos);
                        uint cellCoord = coord3(fpos);
                        if (hash3(cellCoord).x < uDensity) {
                            vec3 h = hash3(cellCoord);
                            vec3 flakePos = 0.5 - 0.5 * cos(4.0 * sin(fpos.yzx*0.073) + 4.0 * sin(fpos.zxy*0.27) + 2.0 * h + timeSpeed * 0.1 * vec3(7,8,5));
                            flakePos = flakePos * 0.8 + 0.1 + fpos;
                            float toIntersection = dot(flakePos - pos, camK) / dot(ray, camK);
                            if (toIntersection > 0.0) {
                                vec3 testPos = pos + ray * toIntersection - flakePos;
                                float depth = dot(flakePos - camPos, camK);
                                float flakeSize = max(uFlakeSize, uMinFlakeSize * depth * 0.5 * invResX);
                                if (length(vec2(dot(testPos, camI), dot(testPos, camJ))) < flakeSize) {
                                    float intensity = exp2(-(t + toIntersection) / uDepthFade) * uBrightness;
                                    gl_FragColor = vec4(uColor * pow(vec3(intensity), vec3(uGamma)), 1.0);
                                    return;
                                }
                            }
                        }
                        float nextStep = min(min(phase.x, phase.y), phase.z);
                        vec3 sel = step(phase, vec3(nextStep));
                        phase = phase - nextStep + strides * sel;
                        t += nextStep;
                        pos = mix(pos + ray * nextStep, floor(pos + ray * nextStep + 0.5), sel);
                    }
                    gl_FragColor = vec4(0.0);
                }
            `;

            return class {
                constructor(container, props = {}) {
                    this.container = container;
                    this.props = {
                        color: '#ffffff', flakeSize: 0.007, minFlakeSize: 1.25,
                        pixelResolution: 500, speed: 0.5, depthFade: 8, farPlane: 20,
                        brightness: 1.5, gamma: 0.4545, density: 0.25,
                        variant: 'square', direction: 200, ...props
                    };
                    this.init();
                }
                init() {
                    const scene = new THREE.Scene();
                    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
                    const width = this.container.offsetWidth || window.innerWidth;
                    const height = this.container.offsetHeight || window.innerHeight;
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    renderer.setSize(width, height);
                    this.container.appendChild(renderer.domElement);

                    const material = new THREE.ShaderMaterial({
                        vertexShader, fragmentShader, transparent: true,
                        uniforms: {
                            uTime: { value: 0 },
                            uResolution: { value: new THREE.Vector2(width, height) },
                            uFlakeSize: { value: this.props.flakeSize },
                            uMinFlakeSize: { value: this.props.minFlakeSize },
                            uPixelResolution: { value: this.props.pixelResolution },
                            uSpeed: { value: this.props.speed },
                            uDepthFade: { value: this.props.depthFade },
                            uFarPlane: { value: this.props.farPlane },
                            uColor: { value: new THREE.Vector3(1, 1, 1) },
                            uBrightness: { value: this.props.brightness },
                            uGamma: { value: this.props.gamma },
                            uDensity: { value: this.props.density },
                            uVariant: { value: 0 },
                            uDirection: { value: (this.props.direction * Math.PI) / 180 }
                        }
                    });
                    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

                    const animate = () => {
                        requestAnimationFrame(animate);
                        material.uniforms.uTime.value = performance.now() * 0.001;
                        if (document.body.classList.contains('light-mode')) {
                            material.uniforms.uColor.value.set(0.6, 0.5, 0.9);
                            material.uniforms.uBrightness.value = 0.8;
                        }

                        renderer.render(scene, camera);
                    };
                    animate();

                    window.addEventListener('resize', () => {
                        const w = this.container.offsetWidth || window.innerWidth;
                        const h = this.container.offsetHeight || window.innerHeight;
                        renderer.setSize(w, h);
                        material.uniforms.uResolution.value.set(w, h);
                    });
                }
            };
        })();

        document.addEventListener('DOMContentLoaded', () => {
            // Sync theme from localStorage
            const savedTheme = localStorage.getItem('quorum_theme') || 'dark';
            if (savedTheme === 'light') document.body.classList.add('light-mode');

            // Initialize PixelSnow
            new PixelSnow(document.getElementById('pixel-snow'));

            // Reveal Card
            gsap.to('#login-card', {
                opacity: 1,
                y: 0,
                duration: 1.2,
                ease: 'power4.out',
                delay: 0.3
            });

            // Emoji Dataset
            const humanEmojis = ['🧔', '👩', '🧒', '👱', '👨‍🦰', '👩‍🦱', '👨‍🦳', '👩‍🦳', '👱‍♀️', '👱‍♂️', '🧔‍♂️', '🧔‍♀️', '👩‍🦰', '👩‍🦲', '👨‍🦲', '🤵', '👰', '🤴', '👸', '👳'];
            const avatarGrid = document.getElementById('avatar-grid');
            let selectedEmoji = humanEmojis[0];

            humanEmojis.forEach((emoji, i) => {
                const opt = document.createElement('div');
                opt.className = 'emoji-option' + (i === 0 ? ' selected' : '');
                opt.innerText = emoji;
                opt.onclick = () => {
                    document.querySelectorAll('.emoji-option').forEach(el => el.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedEmoji = emoji;
                    gsap.fromTo(opt, { scale: 0.9 }, { scale: 1, duration: 0.3, ease: 'back.out' });
                };
                avatarGrid.appendChild(opt);
            });

            // Submit Logic
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.addEventListener('click', () => {
                const username = document.getElementById('username').value.trim();
                if (!username) {
                    gsap.to('#username', { x: 10, duration: 0.1, repeat: 3, yoyo: true, ease: 'linear' });
                    return;
                }
                
                localStorage.setItem('quorum_user_name', username);
                localStorage.setItem('quorum_user_avatar', selectedEmoji);

                submitBtn.innerText = 'Creating account...';
                submitBtn.style.pointerEvents = 'none';
                
                setTimeout(() => {
                    gsap.to('#login-card', {
                        opacity: 0,
                        scale: 0.9,
                        duration: 0.6,
                        ease: 'power4.in',
                        onComplete: () => {
                            window.location.href = 'sidekick_section.html';
                        }
                    });
                }, 1200);
            });
        });
    </script>
</body>
</html>
